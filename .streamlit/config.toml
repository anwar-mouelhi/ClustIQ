[theme]
font = "sans-serif"
baseRadius = "8px"
buttonRadius = "8px"
showWidgetBorder = true
showSidebarBorder = true

redColor = "#d03b3b"
orangeColor = "#ec835a"
yellowColor = "#fab219"
greenColor = "#0ca30c"
grayColor = "#898781"

chartCategoricalColors = [
    "#2a78d6", "#1baf7a", "#eda100", "#008300",
    "#4a3aa7", "#e34948", "#e87ba4", "#eb6834",
]
chartSequentialColors = [
    "#cde2fb", "#9ec5f4", "#86b6ef", "#6da7ec", "#3987e5",
    "#2a78d6", "#256abf", "#1c5cab", "#184f95", "#0d366b",
]

[theme.light]
primaryColor = "#2a78d6"
backgroundColor = "#fcfcfb"
secondaryBackgroundColor = "#f2f1ed"
textColor = "#0b0b0b"
linkColor = "#2a78d6"
borderColor = "#e1e0d9"
dataframeBorderColor = "#e1e0d9"
dataframeHeaderBackgroundColor = "#f2f1ed"
blueColor = "#2a78d6"
violetColor = "#4a3aa7"

[theme.dark]
primaryColor = "#3987e5"
backgroundColor = "#0d0d0d"
secondaryBackgroundColor = "#1a1a19"
textColor = "#ffffff"
linkColor = "#3987e5"
borderColor = "#2c2c2a"
dataframeBorderColor = "#2c2c2a"
dataframeHeaderBackgroundColor = "#1a1a19"
blueColor = "#3987e5"
violetColor = "#9085e9"

[theme.light.sidebar]
backgroundColor = "#f2f1ed"
secondaryBackgroundColor = "#fcfcfb"
borderColor = "#e1e0d9"

[theme.dark.sidebar]
backgroundColor = "#1a1a19"
secondaryBackgroundColor = "#0d0d0d"
borderColor = "#2c2c2a"
